---
# Variables ##########

- name: Include OS-specific variables.
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}-family.yml"

- name: Include Distribution version specific variables
  ansible.builtin.include_vars: "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_major_version'] }}.yml"

# For every `default_<name>` variable, define `<name>` from it, but only when
# `<name>` has not already been set elsewhere (inventory, group/host vars, extra
# vars, etc.). This makes the role's per-OS `vars/*.yml` values behave like
# overridable defaults instead of high-precedence role vars.
- name: Set facts based on defaults  # noqa var-naming
  ansible.builtin.set_fact:
    "{{ item[8:] }}": "{{ lookup('vars', item) }}"
  when: item[8:] not in query('varnames', '.*')
  loop: "{{ query('varnames', '^default_') }}"

##########

- name: Include client
  ansible.builtin.import_tasks: client.yml
  when:
    - run_nagios_client is defined
    - run_nagios_client | bool

- name: Include server
  ansible.builtin.import_tasks: server.yml
  when:
    - run_nagios_server is defined
    - run_nagios_server | bool
